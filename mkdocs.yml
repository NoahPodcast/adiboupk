site_name: adiboupk
site_description: Python dependency isolation for multi-module projects
site_url: https://adiboupk.org/adiboupk/
repo_url: https://github.com/NoahPodcast/adiboupk
repo_name: NoahPodcast/adiboupk

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: slate
      primary: black
      accent: blue
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Concepts: concepts.md
  - Configuration: configuration.md
  - Commands: commands.md
  - Isolation: isolation.md
  - Tutorial: tutorial.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NoahPodcast/adiboupk
